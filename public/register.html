<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — AI Crypto Trading</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-box">⚡</div>
    </div>
    <div class="auth-title">Create account</div>
    <div class="auth-subtitle">Start AI-powered crypto trading</div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="username" placeholder="trader123" required minlength="3">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Referral Code <span style="color:var(--text3)">(optional)</span></label>
        <input class="form-input" type="text" id="referralCode" placeholder="XXXXXXXX">
      </div>
      <div class="form-error hidden" id="registerError"></div>
      <button class="btn btn-primary btn-block" type="submit" id="registerBtn">
        Create Account
      </button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

  // Prefill referral code from URL
  const urlRef = new URLSearchParams(window.location.search).get('ref');
  if (urlRef) document.getElementById('referralCode').value = urlRef;

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const err = document.getElementById('registerError');
    btn.textContent = 'Creating...';
    btn.disabled = true;
    err.classList.add('hidden');

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          referralCode: document.getElementById('referralCode').value,
        })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } else {
        err.textContent = data.error || 'Registration failed';
        err.classList.remove('hidden');
      }
    } catch {
      err.textContent = 'Connection error. Try again.';
      err.classList.remove('hidden');
    } finally {
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
